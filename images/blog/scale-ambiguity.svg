<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 330" role="img"
     aria-label="Two reconstructions of the same plant at different sizes, both consistent with the same photographs.">
  <rect width="860" height="330" rx="10" fill="#f7f9fb"/>

  <defs>
    <g id="plant">
      <!-- pot -->
      <path d="M -26 0 L 26 0 L 20 34 L -20 34 Z" fill="#c98a5b"/>
      <!-- stem -->
      <line x1="0" y1="0" x2="0" y2="-86" stroke="#3d7a4f" stroke-width="5"/>
      <!-- leaves -->
      <g transform="translate(-27,-34) rotate(-18)"><ellipse cx="0" cy="0" rx="27" ry="12" fill="#4fa06a"/></g>
      <g transform="translate(28,-52) rotate(16)"><ellipse cx="0" cy="0" rx="28" ry="12" fill="#4fa06a"/></g>
      <g transform="translate(-24,-70) rotate(-14)"><ellipse cx="0" cy="0" rx="23" ry="11" fill="#5fb079"/></g>
      <circle cx="0" cy="-92" r="9" fill="#5fb079"/>
    </g>
  </defs>

  <g font-family="Helvetica, Arial, sans-serif" text-anchor="middle">

    <!-- small -->
    <use href="#plant" transform="translate(215,215) scale(0.62)"/>
    <line x1="150" y1="215" x2="150" y2="152" stroke="#8a99a8" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="150" y="145" font-size="15" fill="#5b6b7a">? cm</text>
    <text x="215" y="258" font-size="16" font-weight="600" fill="#2f4858">Reconstruction A</text>

    <!-- large -->
    <use href="#plant" transform="translate(620,215) scale(1.05)"/>
    <line x1="510" y1="215" x2="510" y2="109" stroke="#8a99a8" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="510" y="102" font-size="15" fill="#5b6b7a">? cm</text>
    <text x="620" y="258" font-size="16" font-weight="600" fill="#2f4858">Reconstruction B</text>

    <text x="430" y="294" font-size="15" fill="#3d5666">
      Identical shape, different size — and the photographs cannot tell them apart.
    </text>
    <text x="430" y="316" font-size="14" font-style="italic" fill="#6b7a89">
      Nothing in an ordinary photo says how big a centimetre is.
    </text>
  </g>
</svg>
